baseURL = "https://vari.sh/"
languageCode = "en"
title = "vari.sh"
theme = "catppuccin-hugo"

[markup]
  [markup.highlight]
    style = "catppuccin-mocha"
    lineNos = false
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

[params]
  description = "Ethical hacker, security researcher, and digital sorcerer. Welcome to my grimoire."

  [params.author]
    name = "vari.sh"

  authorRole = "Ethical Hacker & Security Researcher"

  heroEyebrow  = "Welcome to my lair"
  heroTitle    = "Hacking, Research<br><em>&amp; Dark Arts</em>"
  heroSubtitle = "Ethical hacker, security researcher, and digital sorcerer. Welcome to my grimoire."

  github = "https://github.com/vari-sh"

  toc    = true
  search = false

[menu]
  [[menu.main]]
    name   = "Home"
    url    = "/"
    weight = 1
  [[menu.main]]
    name   = "Posts"
    url    = "/posts/"
    weight = 2
  [[menu.main]]
    name   = "Tags"
    url    = "/tags/"
    weight = 3
  [[menu.main]]
    name   = "About"
    url    = "/#about"
    weight = 4
  [[menu.main]]
    name   = "GitHub"
    url    = "https://github.com/vari-sh"
    weight = 5

[taxonomies]
  tag      = "tags"
  category = "categories"

[outputs]
  home    = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
