<header class="site-header" role="banner">
  <div class="container--wide">
    <div class="header-inner">

      <a href="{{ "/" | relURL }}" class="site-logo" aria-label="{{ .Site.Title }}">
        <span class="logo-icon" aria-hidden="true">🧙‍♂️</span>
        <span>{{ .Site.Title }}</span>
      </a>

      <nav class="site-nav" id="site-nav" aria-label="Navigazione principale">
        {{ range .Site.Menus.main }}
          <a href="{{ .URL }}" class="nav-link"{{ if .HasChildren }} aria-haspopup="true"{{ end }}>
            {{ .Name }}
          </a>
        {{ else }}
          <a href="{{ "/" | relURL }}" class="nav-link">Home</a>
          <a href="{{ "/posts/" | relURL }}" class="nav-link">Posts</a>
          <a href="{{ "/tags/" | relURL }}" class="nav-link">Tags</a>
          <a href="{{ "/" | relURL }}#about" class="nav-link">About</a>
          {{ with .Site.Params.github }}<a href="{{ . }}" class="nav-link" target="_blank" rel="noopener noreferrer">GitHub</a>{{ end }}
        {{ end }}
      </nav>

      <div class="header-actions">
        {{ if .Site.Params.search }}
        <a href="{{ "/search/" | relURL }}" class="btn-icon" aria-label="Search">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </a>
        {{ end }}

        <button class="btn-icon" id="theme-toggle" aria-label="Toggle theme" title="Toggle theme">
          ☀️
        </button>

        {{ with .Site.Params.github }}
        <a href="{{ . }}" class="btn-icon" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
          <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
          </svg>
        </a>
        {{ end }}

        <button class="mobile-toggle" id="mobile-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="site-nav">
          <span></span><span></span><span></span>
        </button>
      </div>

    </div>
  </div>

  {{/* Reading Progress Bar */}}
  {{ if .IsPage }}
  <div style="position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--border-subtle);">
    <div id="reading-progress" style="height:100%;background:linear-gradient(90deg,var(--mauve),var(--blue));width:0;transition:width 0.1s;"></div>
  </div>
  {{ end }}
</header>
